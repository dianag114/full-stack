<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestión de Contactos</title>

    <!-- FAVICON -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/747/747376.png">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                Agenda de Contactos
            </a>

        </div>

    </nav>



    <!-- CONTENIDO -->
    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Gestión de Contactos</h2>

            <button
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#modalAgregar">

                Agregar Contacto

            </button>

        </div>



        <!-- TABLA -->
        <div class="table-responsive shadow rounded">

            <table class="table table-hover align-middle">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaContactos"></tbody>

            </table>

        </div>

    </div>



    <!-- MODAL AGREGAR -->
    <div class="modal fade" id="modalAgregar">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header bg-primary text-white">

                    <h5 class="modal-title">
                        Agregar Contacto
                    </h5>

                    <button
                        type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                    </button>

                </div>



                <div class="modal-body">

                    <form id="formAgregar">


                        <!-- NOMBRE -->
                        <div class="mb-3">

                            <label>Nombre y Apellido</label>

                            <input
                                type="text"
                                id="nombre"
                                class="form-control"
                                minlength="5"
                                title="Debes escribir nombre y apellido"
                                required>

                        </div>



                        <!-- TELEFONO -->
                        <div class="mb-3">

                            <label>Teléfono</label>

                            <input
                                type="text"
                                id="telefono"
                                class="form-control"
                                maxlength="10"
                                pattern="[0-9]{10}"
                                title="Debes ingresar 10 números"
                                required>

                        </div>



                        <!-- CORREO -->
                        <div class="mb-3">

                            <label>Correo</label>

                            <input
                                type="email"
                                id="correo"
                                class="form-control"
                                required>

                        </div>



                        <button class="btn btn-success w-100">

                            Guardar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>



    <!-- MODAL EDITAR -->
    <div class="modal fade" id="modalEditar">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header bg-warning">

                    <h5 class="modal-title">
                        Actualizar Contacto
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>



                <div class="modal-body">

                    <form id="formEditar">

                        <input type="hidden" id="editId">


                        <!-- NOMBRE -->
                        <div class="mb-3">

                            <label>Nombre y Apellido</label>

                            <input
                                type="text"
                                id="editNombre"
                                class="form-control"
                                minlength="5"
                                title="Debes escribir nombre y apellido"
                                required>

                        </div>



                        <!-- TELEFONO -->
                        <div class="mb-3">

                            <label>Teléfono</label>

                            <input
                                type="text"
                                id="editTelefono"
                                class="form-control"
                                maxlength="10"
                                pattern="[0-9]{10}"
                                title="Debes ingresar 10 números"
                                required>

                        </div>



                        <!-- CORREO -->
                        <div class="mb-3">

                            <label>Correo</label>

                            <input
                                type="email"
                                id="editCorreo"
                                class="form-control"
                                required>

                        </div>



                        <button class="btn btn-warning w-100">

                            Actualizar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>



    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center mt-5 p-4">

        <p class="mb-0">
            Desarrollado por:
            Diana Laura Gonzalez Rivera
        </p>

    </footer>



    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- APP -->
    <script type="module" src="assets/js/app.js"></script>

</body>

</html>
